<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>米珠刺繡飾品客製化平台</title>
    <style>
        :root {
            --e-global-color-primary: #834300;
            --e-global-color-secondary: #F9F5F0;
            --e-global-color-text: #AC7032;
            --e-global-color-accent: #F0CA74;
        }
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: var(--e-global-color-secondary);
            color: var(--e-global-color-text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .wrap { width: 100%; max-width: 900px; padding: 48px 16px; text-align: center; }
        h1 { margin: 0 0 12px; font-size: 40px; font-weight: 1000; letter-spacing: 1px; color: var(--e-global-color-text); }
        p { margin: 0 auto 28px; max-width: 520px; color: rgba(172,112,50,.95); font-size: 16px; line-height: 1.8; }
        .btns { display: flex; justify-content: center; align-items: center; gap: 16px; flex-wrap: wrap; margin-top: 10px; }
        .btn { min-width: 140px; width: auto; border: none; cursor: pointer; padding: 14px 22px; border-radius: 14px; font-weight: 1000; font-size: 18px; color: var(--e-global-color-primary); background: var(--e-global-color-accent); box-shadow: 0 10px 24px rgba(0,0,0,.12); transition: transform .05s ease; text-decoration: none; display: inline-block; }
        .btn:active { transform: scale(.99); }
        @media (max-width: 520px) {
            .btns { flex-direction: column; align-items: center; }
            .btn { width: 100%; max-width: 320px; text-align: center; }
        }
        .alert-msg { background: #ffe0e0; color: #c0392b; border-radius: 10px; padding: 10px 16px; margin-bottom: 18px; font-size: 15px; }
        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); display: none; align-items: center; justify-content: center; padding: 16px; z-index: 999; }
        .modal-overlay.show { display: flex; }
        .modal { width: 100%; max-width: 520px; background: #fff; border-radius: 18px; box-shadow: 0 20px 60px rgba(0,0,0,.25); overflow: hidden; }
        .modal-header { padding: 16px 18px; background: var(--e-global-color-secondary); border-bottom: 1px solid rgba(172,112,50,.25); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .modal-title { font-weight: 1000; color: var(--e-global-color-text); font-size: 18px; margin: 0; }
        .modal-close { border: none; background: transparent; cursor: pointer; font-size: 18px; padding: 6px 10px; border-radius: 10px; }
        .modal-close:hover { background: rgba(172,112,50,.08); }
        .modal-body { padding: 18px; text-align: left; }
        .field { margin-bottom: 14px; }
        .field label { display: block; font-weight: 900; margin-bottom: 8px; color: var(--e-global-color-text); }
        .field input { width: 100%; padding: 12px; border: 1px solid rgba(172,112,50,.25); border-radius: 12px; outline: none; font-size: 15px; box-sizing: border-box; }
        .field input:focus { border-color: rgba(172,112,50,.6); box-shadow: 0 0 0 3px rgba(240,202,116,.28); }
        .modal-actions { display: flex; gap: 12px; justify-content: center; padding: 0 18px 18px; }
        .modal-actions .btn { flex: 1; min-width: 0; font-size: 16px; }
        .btn-secondary { background: transparent; color: var(--e-global-color-text); border: 1px solid rgba(172,112,50,.35); box-shadow: none; }
        .btn-secondary:hover { background: rgba(172,112,50,.08); }
        .btn-primary { background: var(--e-global-color-accent); color: var(--e-global-color-text); border: none; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>米珠刺繡飾品客製化平台</h1>
        <p>免費體驗【葉子🍂】客製化；需要完整體驗流程請登入/註冊。</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="alert-msg">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="btns">
            <button class="btn" onclick="window.location.href='{{ url_for('leaf') }}?mode=free'">免費體驗</button>
            <button class="btn" id="btnLogin">登入</button>
            <button class="btn" id="btnRegister">註冊新帳號</button>
        </div>
    </div>

    <!-- 登入 Modal -->
    <div class="modal-overlay" id="loginOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">登入</h2>
                <button class="modal-close" id="closeLogin">✕</button>
            </div>
            <form method="POST" action="{{ url_for('login') }}">
                <div class="modal-body">
                    <div class="field">
                        <label>Email</label>
                        <input name="email" type="email" placeholder="請輸入 Email" required />
                    </div>
                    <div class="field">
                        <label>密碼</label>
                        <input name="password" type="password" placeholder="請輸入密碼" required />
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" id="cancelLogin" type="button">取消</button>
                    <button class="btn btn-primary" type="submit">登入</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 註冊 Modal -->
    <div class="modal-overlay" id="registerOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">註冊新帳號</h2>
                <button class="modal-close" id="closeRegister">✕</button>
            </div>
            <form method="POST" action="{{ url_for('register') }}">
                <div class="modal-body">
                    <div class="field">
                        <label>姓名</label>
                        <input name="username" type="text" placeholder="請輸入姓名" required />
                    </div>
                    <div class="field">
                        <label>Email</label>
                        <input name="email" type="email" placeholder="請輸入 Email" required />
                    </div>
                    <div class="field">
                        <label>密碼</label>
                        <input name="password" type="password" placeholder="請輸入密碼" required />
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" id="cancelRegister" type="button">取消</button>
                    <button class="btn btn-primary" type="submit">註冊</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openModal(el) { el.classList.add("show"); }
        function closeModal(el) { el.classList.remove("show"); }

        const loginOverlay = document.getElementById("loginOverlay");
        const registerOverlay = document.getElementById("registerOverlay");

        document.getElementById("btnLogin").addEventListener("click", () => openModal(loginOverlay));
        document.getElementById("btnRegister").addEventListener("click", () => openModal(registerOverlay));
        document.getElementById("closeLogin").addEventListener("click", () => closeModal(loginOverlay));
        document.getElementById("cancelLogin").addEventListener("click", () => closeModal(loginOverlay));
        document.getElementById("closeRegister").addEventListener("click", () => closeModal(registerOverlay));
        document.getElementById("cancelRegister").addEventListener("click", () => closeModal(registerOverlay));

        loginOverlay.addEventListener("click", (e) => { if (e.target === loginOverlay) closeModal(loginOverlay); });
        registerOverlay.addEventListener("click", (e) => { if (e.target === registerOverlay) closeModal(registerOverlay); });

        window.addEventListener("keydown", (e) => {
            if (e.key === "Escape") { closeModal(loginOverlay); closeModal(registerOverlay); }
        });
    </script>
</body>
</html>
